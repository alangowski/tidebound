name: tidebound
region: nyc
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend
databases:
  - engine: PG
    name: db
    num_nodes: 1
    size: db-s-dev-database
    version: "16"
services:
  - name: backend
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DASHBOARD"
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "SET_IN_DASHBOARD"
      - key: EMAIL_FROM
        scope: RUN_TIME
        value: tidebound@resend.dev
      - key: APP_URL
        scope: RUN_TIME
        value: https://plankton-app-svf3w.ondigitalocean.app
    github:
      repo: alangowski/tidebound
      branch: main
      deploy_on_push: true
    source_dir: backend
    environment_slug: node-js
    build_command: npm ci
    run_command: npm start
    http_port: 8080
    health_check:
      http_path: /api/health
      port: 8080
static_sites:
  - name: frontend
    github:
      repo: alangowski/tidebound
      branch: main
      deploy_on_push: true
    source_dir: frontend
    environment_slug: node-js
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
