name: tidebound
region: nyc
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: frontend
services:
  - name: backend
    github:
      repo: alangowski/tidebound
      branch: main
      deploy_on_push: true
    source_dir: ./backend
    environment_slug: node-js
    build_command: npm ci
    run_command: npm start
    http_port: 8080
    health_check:
      http_path: /api/health
      port: 8080
static_sites:
  - name: frontend
    github:
      repo: alangowski/tidebound
      branch: main
      deploy_on_push: true
    source_dir: ./frontend
    environment_slug: node-js
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
